<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AniList Auth</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet"/>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: #f4f6f8;
      color: #333;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .container {
      background-color: #fff;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
      height: 100px;
    }
    h1 {
      margin-bottom: 1rem;
      font-size: 1.5rem;
      font-weight: 700;
    }
    p {
      margin: 0.5rem 1.5rem;
      font-size: 1rem;
    }
    .success {
      color: #2a9d8f;
    }
    .error {
      color: #e76f51;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="status">Authentication in progress...</h1>
    <p>Please wait while the process is running</p>
  </div>

  <script>
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get("access_token");
      const statusEl = document.getElementById("status");

      if (accessToken) {
        fetch('/token?access_token=' + accessToken)
                .then(res => {
                  if (res.ok) {
                    statusEl.textContent = 'Authentication successful!';
                    statusEl.classList.add('success');
                    document.querySelector('p').textContent = 'You can close this tab now.';
                  } else {
                    throw new Error('Server error');
                  }
                })
                .catch(() => {
                  statusEl.textContent = 'Error saving token!';
                  statusEl.classList.add('error');
                  document.querySelector('p').textContent = 'Please try again.';
                });
      } else {
        statusEl.textContent = 'No access token found!';
        statusEl.classList.add('error');
        document.querySelector('p').textContent = 'Authentication failed.';
      }
  </script>
</body>
</html>
