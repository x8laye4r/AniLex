query GetCharacterDetailsQuery($id: Int) {
    Character(id: $id) {
        id
        name {
            userPreferred
            native
            alternative
            alternativeSpoiler
        }
        image {
            large
        }
        description
        gender
        dateOfBirth {
            ...FuzzyDate
        }
        age
        bloodType
        favourites
        isFavourite
        siteUrl
    }
}